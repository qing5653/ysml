input_model: experiments/yolo11_student_distill/weights/best.pt
output_model: models/weights/yolo11_student_pruned.pt
channel_prune_ratio: 0.3
stats_output: experiments/benchmark/prune_stats.json

# 为 true 时，在剪枝微调阶段禁用 Comet 自动日志，避免无 API Key 噪声警告。
disable_comet: true

finetune:
  data: configs/dataset.yaml
  epochs: 30
  imgsz: 640
  batch: 16
  device: 0
  workers: 0
  project: experiments
  name: yolo11_student_pruned_finetune
  # 为 true 时，微调开始前自动去重标签文件中的重复行。
  dedupe_labels_on_start: true
  # 为 true 时，自动尝试从 experiments/<name*>/weights/last.pt 热启动继续训练。
  warm_start_from_last: true