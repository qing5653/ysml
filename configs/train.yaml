model: src/yolo11n.pt
data: configs/dataset.yaml
epochs: 100
imgsz: 640
batch: 16
device: 0
project: experiments
name: yolo11_spot_bifpn
workers: 0

# 数据增强与候选区域引导
use_prepared_dataset: false
prepared_dataset_yaml: configs/dataset_prepared.yaml

# 自适应损失: 基于类别频次自动调整分类分支参数
adaptive_loss:
  enabled: true
  cls_gain_min: 0.6
  cls_gain_max: 2.0
  fl_gamma_min: 1.0
  fl_gamma_max: 2.5

# 预测配置（用于 scripts/cli.py predict）
predict:
  conf: 0.25
  imgsz: 640
  use_spot_guided: true

# 基准配置（用于 scripts/cli.py benchmark）
benchmark:
  source_split: val
  sample_limit: 100
  conf: 0.25
  imgsz: 640
  use_spot_guided_options: [false, true]
  target_fps: 25
  output_csv: experiments/benchmark/fps.csv

# 可追溯声明：由代码实现与实验结果驱动 report checklist。
claims:
  research_route: B
  bifpn_implemented: false
  target_effective_sparsity: 29.5
