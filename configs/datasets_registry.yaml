datasets:
  neu_det:
    path: data/fa031-main/NEU-DET
    task: detect
    notes: fa031-main 内的 NEU-DET 已含 train/valid 与 yolo 标签，可直接用于检测训练。
    required:
      - train/images
      - train/labels
      - valid/images
      - valid/labels

  quality_control367:
